name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Test (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest

    permissions:
      checks: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        bun-version: ["1.2", "1.3"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Test
        id: test
        run: |
          set -o pipefail
          bun test src/tests/ 2>&1 | tee /tmp/test-output.txt
          {
            echo "### 📊 Coverage Report"
            echo ""
            grep -E '.*\|' /tmp/test-output.txt | grep -v '^\-' | \
            awk -F'|' '{
              for(i=1;i<=NF;i++) gsub(/^ +| +$/, "", $i)
              printf "| %s | %s | %s | %s |\n", $1, $2, $3, $4
              if(NR==1) print "|---|---|---|---|"
            }'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate JUnit report
        if: always()
        run: bun test --reporter=junit --reporter-outfile=test-results.xml src/tests/ > /dev/null 2>&1 || true

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: steps.test.conclusion != 'skipped' && steps.test.conclusion != 'cancelled'
        with:
          name: Bun Test Report (Bun ${{ matrix.bun-version }})
          path: test-results.xml
          reporter: java-junit
          fail-on-error: true
