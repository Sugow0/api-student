name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Test (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest

    permissions:
      checks: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        bun-version: ["1.1", "1.2"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test:run

      - name: Generate JUnit report
        if: always()
        run: bun test --reporter=junit --reporter-outfile=test-results.xml src/tests/ > /dev/null 2>&1 || true

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Bun Test Report (Bun ${{ matrix.bun-version }})
          path: test-results.xml
          reporter: java-junit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-bun-${{ matrix.bun-version }}
          path: coverage/
